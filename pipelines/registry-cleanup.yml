## Cleanup job for the registries

registry_cleanup:
  stage: SystemMaintenance
  extends:
  - .nightly-repo-cleanup
  needs: []
  image: $VM_IMAGE_NAME_LINUX
  tags:
    - VM
    - amd64
  variables:
    KDECI_CACHE_PATH: /mnt/artifacts/suse-qt6.9/
    KDECI_GITLAB_SERVER: https://invent.kde.org/
    KDECI_REPO_METADATA_PATH: "$CI_PROJECT_DIR/ci-utilities/repo-metadata"
  before_script:
    - git clone https://invent.kde.org/packaging/krita-ci-utilities.git --depth=1 ci-utilities
  script:
    - python3 -u ci-utilities/package-registry-cleanup.py --project teams/ci-artifacts/krita-windows
    - python3 -u ci-utilities/package-registry-cleanup.py --project teams/ci-artifacts/krita-appimage
    - python3 -u ci-utilities/package-registry-cleanup.py --project teams/ci-artifacts/krita-macos
    - python3 -u ci-utilities/package-registry-cleanup.py --project teams/ci-artifacts/krita-android-x86_64
    - python3 -u ci-utilities/package-registry-cleanup.py --project teams/ci-artifacts/krita-android-arm64-v8a
    - python3 -u ci-utilities/package-registry-cleanup.py --project teams/ci-artifacts/krita-android-armeabi-v7a
